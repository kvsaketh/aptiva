# Aptiva — Nginx reverse proxy (HTTP only).
# Install: copy to /etc/nginx/sites-available/aptiva, replace YOURDOMAIN, symlink,
# `nginx -t && systemctl reload nginx`, then run `certbot --nginx` — certbot adds
# the 443 server block, certificates and the HTTP→HTTPS redirect automatically.
server {
    listen 80;
    listen [::]:80;
    server_name YOURDOMAIN www.YOURDOMAIN;

    client_max_body_size 50m;            # matches the app's 50MB body limit

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Long-cache the content-hashed build assets.
    location /assets/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;     # so the app sees HTTPS
        proxy_read_timeout 300s;
    }
}

# Aptiva — Nginx reverse proxy.
# Put at /etc/nginx/sites-available/aptiva, symlink into sites-enabled,
# replace YOURDOMAIN, then run certbot (see ORACLE_CLOUD.md) to add SSL.

server {
    listen 80;
    listen [::]:80;
    server_name YOURDOMAIN www.YOURDOMAIN;

    # Let certbot serve the ACME challenge, redirect everything else to HTTPS.
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOURDOMAIN www.YOURDOMAIN;

    # certbot fills these in (paths shown for reference):
    # ssl_certificate     /etc/letsencrypt/live/YOURDOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN/privkey.pem;

    client_max_body_size 50m;            # matches the app's 50MB body limit

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Long-cache the content-hashed build assets.
    location /assets/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;     # so the app sees HTTPS
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 300s;
    }
}
